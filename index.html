<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

    <script src="script.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

   <style>
    body { font-family: 'Inter', sans-serif; }
   </style>

</head>
<body>
    <section id="auth-container" class="min-h-screen flex justify-center items-center bg-[#F8F9FA] p-4">
        
        <div id="auth-panel" class="bg-white py-6 px-8 rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.05)] border border-gray-100 w-full max-w-md">
            <div class="flex flex-col items-center mb-3">
            <img class="w-16 h-16 mb-2" src="Images/github-logo.png" alt="Github Logo">
            <h1 class="text-2xl font-bold mb-1 text-gray-700">Github Issues Tracker</h1>
            <p class="text-base text-gray-500">Sign in to manage your issues</p>
          </div >
        <div class="space-y-4">
            <div>
                <label for="auth-admin-username" class="block text-[15px] mb-1.5 font-semibold text-gray-800">Username:</label>
                <input type="text" id="auth-admin-username" name="username" placeholder="Enter Username" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-[15px] focus:outline-none focus:border-[#5200FF] focus:ring-1 focus:ring-[#5200FF] transition-all">
                <p class="text-[13px] text-[#5200FF] mt-1.5 font-medium">Default: admin</p>
            </div>
            <div>
                <label for="auth-admin-password" class="block text-[15px] mb-1.5 font-semibold text-gray-800">Password:</label>
                <input type="password" id="auth-admin-password" name="password" placeholder="Enter Password" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-[15px] focus:outline-none focus:border-[#5200FF] focus:ring-1 focus:ring-[#5200FF] transition-all">
                <p class="text-[13px] text-[#5200FF] mt-1.5 font-medium">Default: admin123</p>
            </div>
        </div>
            <button id="auth-submit-btn" class="w-full bg-[#4A00FF] hover:bg-[#3b00cc] text-white font-semibold py-3 px-4 rounded-lg mt-6 transition-colors duration-200 text-[15px]">
                Sign In
            </button>
            <div class="flex items-center justify-center my-7">
                <div class="border-t border-gray-200 grow"></div>
                <span class="px-2 text-gray-500 text-sm">OR</span>
                <div class="border-t border-gray-200 grow"></div>
            </div>
            <div class="text-center">
                <p class="text-[14px] text-gray-500 mb-2">Demo Credentials</p>
                <div class="bg-[#f2f7fb] rounded-xl p-4 text-center border border-gray-100">
                    <p class="text-[15px] text-gray-800"><span class="font-bold">Username:</span> admin</p>
                    <p class="text-[15px] text-gray-800 mt-0.5" ><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
