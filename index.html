<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

    <script src="script.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Images/github-logo.png">

   <style>
    body { font-family: 'Inter', sans-serif; }
   </style>

</head>
<body>
    <section id="auth-container" class="min-h-screen flex justify-center items-center bg-[#F8F9FA] p-4">
        
        <div id="auth-panel" class="bg-white py-6 px-8 rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.05)] border border-gray-100 w-full max-w-md">
            <div class="flex flex-col items-center mb-3">
            <img class="w-16 h-16 mb-2" src="Images/github-logo.png" alt="Github Logo">
            <h1 class="text-2xl font-bold mb-1 text-gray-700">Github Issues Tracker</h1>
            <p class="text-base text-gray-500">Sign in to manage your issues</p>
          </div >
        <div class="space-y-4">
            <div>
                <label for="auth-admin-username" class="block text-[15px] mb-1.5 font-semibold text-gray-800">Username:</label>
                <input type="text" id="auth-admin-username" name="username" placeholder="Enter Username" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-[15px] focus:outline-none focus:border-[#5200FF] focus:ring-1 focus:ring-[#5200FF] transition-all">
                <p class="text-[13px] text-[#5200FF] mt-1.5 font-medium">Default: admin</p>
            </div>
            <div>
                <label for="auth-admin-password" class="block text-[15px] mb-1.5 font-semibold text-gray-800">Password:</label>
                <input type="password" id="auth-admin-password" name="password" placeholder="Enter Password" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-[15px] focus:outline-none focus:border-[#5200FF] focus:ring-1 focus:ring-[#5200FF] transition-all">
                <p class="text-[13px] text-[#5200FF] mt-1.5 font-medium">Default: admin123</p>
            </div>
        </div>
            <button id="auth-submit-btn" class="w-full bg-[#4A00FF] hover:bg-[#3b00cc] text-white font-semibold py-3 px-4 rounded-lg mt-6 transition-colors duration-200 text-[15px]">
                Sign In
            </button>
            <div class="flex items-center justify-center my-7">
                <div class="border-t border-gray-200 grow"></div>
                <span class="px-2 text-gray-500 text-sm">OR</span>
                <div class="border-t border-gray-200 grow"></div>
            </div>
            <div class="text-center">
                <p class="text-[14px] text-gray-500 mb-2">Demo Credentials</p>
                <div class="bg-[#f2f7fb] rounded-xl p-4 text-center border border-gray-100">
                    <p class="text-[15px] text-gray-800"><span class="font-bold">Username:</span> admin</p>
                    <p class="text-[15px] text-gray-800 mt-0.5" ><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>
    <main id="auth-dashboard-wrapper" class="hidden min-h-screen bg-[#F8F9FA] pb-12">
        
        <nav class="bg-white border-b border-gray-200 px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="Images/github-logo.png" alt="GitHub Logo" class="w-8 h-8 object-contain">
                <h2 class="text-[20px] font-bold text-[#24292F]">GitHub Issues Tracker</h2>
            </div>
            
            <div class="flex w-full sm:w-auto gap-4 items-center">
                <div class="relative w-full sm:w-72">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="live-search-input" placeholder="Search issues..." class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-[14px] focus:outline-none focus:border-[#5200FF] focus:ring-1 focus:ring-[#5200FF] transition-all bg-gray-50">
                </div>
                <button class="bg-[#5200FF] hover:bg-[#3b00cc] text-white px-5 py-2 rounded-lg text-[14px] font-medium transition-colors whitespace-nowrap">
                    + New Issue
                </button>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-8 mt-8">
            
            <div class="bg-white p-2 inline-flex rounded-lg shadow-sm mb-6 gap-2 border border-gray-100">
                <button id="tab-all" class="px-8 py-2 rounded-md bg-[#5200FF] text-white text-[14px] font-medium transition-all">All</button>
                <button id="tab-open" class="px-8 py-2 rounded-md bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 text-[14px] font-medium transition-all">Open</button>
                <button id="tab-closed" class="px-8 py-2 rounded-md bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 text-[14px] font-medium transition-all">Closed</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-6 border-b border-gray-100">
                    <div class="flex items-center gap-4">
                        <div class="bg-[#f2f7fb] p-3 rounded-full flex items-center justify-center">
                            <img src="Images/Aperture.png" alt="">
                        </div>
                        <div>
                            <h3 class="text-[18px] font-bold text-gray-800"><span id="total-issue-count">0</span> Issues</h3>
                            <p class="text-[13px] text-gray-500 mt-0.5">Track and manage your project issues</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-5 text-[14px] font-medium text-gray-700 mt-4 sm:mt-0">
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-[#10b981]"></span> Open
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-[#8b5cf6]"></span> Closed 
                        </div>
                    </div>
                </div>

                <div id="issues-grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>

                 <div id="loading-spinner-container" class="hidden justify-center items-center py-20 w-full col-span-full">
                    <div class="w-12 h-12 border-4 border-[#5200FF] border-dashed rounded-full animate-spin"></div>
                </div>

                <div id="issues-grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
            </div>
        </div>
    </main>
    
    <div id="issue-modal" class="hidden fixed top-0 left-0 w-screen h-screen bg-black/60 backdrop-blur-sm z-50">
        
        <div class="bg-white rounded-2xl max-w-2xl w-full p-5 sm:p-8 shadow-2xl max-h-[90vh] overflow-y-auto absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
            
            <button id="close-modal-btn" class="absolute top-4 right-4 sm:top-5 sm:right-5 text-gray-400 hover:text-red-500 hover:rotate-90 transition-all duration-200">
                <svg class="w-6 h-6 sm:w-7 sm:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div id="modal-content-container"></div>
            
        </div>
    </div>
</body>
</html>
